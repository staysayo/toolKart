; =========================================================================
; PROJECT: Heavy-Duty Motorized Toolbox (ALPHA PHASE)
; TARGET: Teensy 4.1
; ARCHITECTURE: Dual-Bus Modbus RTU (Motor Bus & Joystick Bus)
; =========================================================================
; Please visit documentation for the other options and examples
; https://docs.platformio.org/page/projectconf.html

[env:teensy41]
platform = teensy
board = teensy41
framework = arduino

; --- SERIAL MONITOR SETTINGS ---
; Matches the Serial.begin(115200) in our main.cpp setup.
monitor_speed = 115200

; --- LIBRARY DEPENDENCIES ---
; We are intentionally keeping this empty. 
; Per the Separation of Concerns Blueprint, we are using custom, 
; non-blocking Modbus state machines rather than generic libraries 
; to guarantee strict timing over the RE/DE transceiver pins.
lib_deps =

; --- COMPILER FLAGS ---
; 1. Remove default size optimizations to make debugging easier
build_unflags = 
    -Os

build_flags = 
    ; 2. MANDATORY: Tells the compiler to compile the USB Virtual COM port drivers.
    ; Without this, Serial.print() goes nowhere in PlatformIO.
    -D USB_SERIAL
    
    ; 3. Turn off optimization (-O0) for Alpha testing. 
    ; Ensures the compiler doesn't optimize away diagnostic variables or 
    ; alter the execution speed of our precise Modbus timing loops.
    -O0 
    
    ; 4. Keep your formatting warnings (Good practice for hex payloads)
    -Wformat=1
