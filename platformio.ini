; PlatformIO Project Configuration File
;
;   Build options: build flags, source filter
;   Upload options: custom upload port, speed and extra flags
;   Library options: dependencies, extra library storages
;   Advanced options: extra scripting
;
; Please visit documentation for the other options and examples
; https://docs.platformio.org/page/projectconf.html
; Project: Heavy-Duty Motorized Toolbox
; Target: Teensy 4.1
; Architecture: Dual-Bus Modbus RTU (Motor Bus & Joystick Bus)

[env:teensy41]
platform = teensy
board = teensy41
framework = arduino

; Serial Monitor Settings
monitor_speed = 115200

; Library Dependencies
lib_deps =
    ; Add specific Modbus or Kinematics libraries here as needed
    ; Example: bakercp/PacketSerial @ ^1.4.0

; Build Flags for Safety and Performance
build_flags = 
    -D TEENSY_OPT_FASTER_LTO ; Optimize for speed and Link Time Optimization
    -Wformat=1               ; Enable format string warnings for Modbus frames